function hasCloudStorage() {
  return typeof window !== "undefined" && window.storage && typeof window.storage.set === "function";
}
function lsKey(key, shared) {
  return shared ? "matable_shared_" + key : "matable_local_" + key;
}
function storageSave(key, data, shared) {
  var json = JSON.stringify(data);
  if (hasCloudStorage()) {
    try {
      var p = window.storage.set(key, json, shared||false);
      if (p && typeof p.then === "function") {
        return p.then(function() {
          // Aussi sauvegarder en localStorage comme backup
          try { window.localStorage.setItem(lsKey(key, shared), json); } catch(e2) {}
        }).catch(function() {
          try { window.localStorage.setItem(lsKey(key, shared), json); } catch(e2) {}
        });
      }
    } catch(e) {}
  }
  // Fallback localStorage
  try { window.localStorage.setItem(lsKey(key, shared), json); } catch(e) {}
  return Promise.resolve();
}
function storageLoad(key, shared) {
  if (hasCloudStorage()) {
    try {
      var p = window.storage.get(key, shared||false);
      if (p && typeof p.then === "function") {
        return p.then(function(r) {
          if (r && r.value) {
            try { return JSON.parse(r.value); } catch(e) {}
          }
          // Fallback localStorage si cloud vide
          try {
            var local = window.localStorage.getItem(lsKey(key, shared));
            if (local) return JSON.parse(local);
          } catch(e2) {}
          return null;
        }).catch(function() {
          try {
            var local = window.localStorage.getItem(lsKey(key, shared));
            if (local) return JSON.parse(local);
          } catch(e2) {}
          return null;
        });
      }
    } catch(e) {}
  }
  // Fallback localStorage uniquement
  return new Promise(function(resolve) {
    try {
      var local = window.localStorage.getItem(lsKey(key, shared));
      resolve(local ? JSON.parse(local) : null);
    } catch(e) { resolve(null); }
  });
}

function saveData(d, mode, groupKey) {
  if (mode === "group" && groupKey) {
    return storageSave(SKEY_GROUP_PREFIX + groupKey, d, true);
  }
  return storageSave(SKEY_PERSONAL, d, false);
}
function loadData(mode, groupKey) {
  if (mode === "group" && groupKey) {
    return storageLoad(SKEY_GROUP_PREFIX + groupKey, true);
  }
  return storageLoad(SKEY_PERSONAL, false);
}

  var h = hex.slice(1);
  if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  var r = Math.round(parseInt(h.slice(0,2),16) * (1-factor));

// ── Estimation du coût d'une recette ──────────────────────
function findCatProduct(ingName, catalogue) {
  var nameLow = ingName.toLowerCase().trim();
  // 1. Match exact
  var exact = catalogue.find(function(p){ return p.name.toLowerCase().trim() === nameLow; });
  if (exact) return exact;
  // 2. Match sur mots entiers seulement (évite "ail" dans "volaille")
  return catalogue.find(function(p) {
    var pLow = p.name.toLowerCase().trim();
    // Le nom catalogue doit avoir >= 4 chars pour éviter les faux positifs courts
    if (pLow.length < 4 && nameLow !== pLow) return false;
    // Vérifier que pLow est un mot/groupe entier dans nameLow (entouré de séparateurs)
    var reCat = new RegExp("(^|\\s)" + pLow.replace(/[.*+?^${}()|[\]\\]/g,"\\$&") + "(\\s|$)");
    var reIng = new RegExp("(^|\\s)" + nameLow.replace(/[.*+?^${}()|[\]\\]/g,"\\$&") + "(\\s|$)");
    return reCat.test(nameLow) || reIng.test(pLow);
  });
}
function unitsCompatible(u1, u2) {
  if (!u1 || !u2) return true;
  var a = u1.toLowerCase(); var b = u2.toLowerCase();
  if (a === b) return true;
  var groups = [
    ["g","kg","mg"],
    ["ml","l","cl","dl"],
    ["piece","pièce","pièces","pieces","unite","unité","tranche","tranches","portion","portions"],
    ["cube","cubes"],
    ["botte","bottes","bouquet","bouquets","tete","tête","bulbe","bulbes"],
    ["c.c.","cc","cuillere a cafe","cuillère à café","tsp"],
    ["c.s.","cs","cuillere a soupe","cuillère à soupe","tbsp"],
    ["gousse","gousses"],
    ["branche","branches","tige","tiges","feuille","feuilles"],
    ["sachet","sachets","boite","boîte","pot","pots","conserve"]
  ];
  for (var i=0; i<groups.length; i++) {
    var g = groups[i];
    if (g.indexOf(a)>=0 && g.indexOf(b)>=0) return true;
  }
  return false;
}
function convertQty(qty, fromUnit, toUnit) {
  if (!fromUnit || !toUnit) return qty;
  var f = fromUnit.toLowerCase();
  var t = toUnit.toLowerCase();
  if (f === t) return qty;
  // Volume : tout convertir en litres
  var toL = {ml:0.001, cl:0.01, dl:0.1, l:1, litre:1, litres:1};
  if (toL[f] !== undefined && toL[t] !== undefined) return qty * toL[f] / toL[t];
  // Masse : tout convertir en grammes
  var toG = {mg:0.001, g:1, gramme:1, grammes:1, kg:1000};
  if (toG[f] !== undefined && toG[t] !== undefined) return qty * toG[f] / toG[t];
  return qty;
}

function estimateCost(recipe, catalogue, servings) {
  if (!recipe || !recipe.ingredients || !recipe.ingredients.length) return null;
  var n = servings || recipe.servings || 4;
  var ratio = n / (recipe.servings || 4);
  var total = 0;
  var matched = 0;
  var lines = [];
  recipe.ingredients.forEach(function(ing) {
    var nameLow = ing.name.toLowerCase();
    var cat = findCatProduct(ing.name, catalogue);
    // Prix ponctuel défini sur la recette → priorité absolue
    if (ing.price != null && ing.price >= 0) {
      var lineTotal = Math.round(ing.price * ratio * 100) / 100;
      total += lineTotal;
      matched++;
      lines.push({name:ing.name, qty:ing.qty, unit:ing.unit, catUnit:cat?cat.unit:ing.unit, price:lineTotal, catId:cat?cat.id:null, ok:true, ponctuel:true});
    } else if (cat && cat.price) {
      var compat = unitsCompatible(ing.unit, cat.unit);
      var convQty = convertQty(ing.qty || 1, ing.unit, cat.unit);
      var lineTotal = Math.round(cat.price * convQty * ratio * 100) / 100;
      if (compat) {
        total += lineTotal;
        matched++;
        lines.push({name:ing.name, qty:ing.qty, unit:ing.unit, catUnit:cat.unit, price:lineTotal, catId:cat.id, ok:true});
      } else {
        lines.push({name:ing.name, qty:ing.qty, unit:ing.unit, catUnit:cat.unit, catPrice:cat.price, catId:cat.id, ok:false, mismatch:true});
      }
    } else {
      lines.push({name:ing.name, qty:ing.qty, unit:ing.unit, catId:cat?cat.id:null, ok:false, noPrice:!cat, noCat:!cat});
    }
  });
  if (matched === 0 && lines.filter(function(l){return l.mismatch;}).length === 0) return null;
  return { total: Math.round(total * 100) / 100, matched: matched, outOf: recipe.ingredients.length, lines: lines };
}

// Formate un prix: 2.5 → "2,50€"
function fmtEuro(n) {
  if (n === null || n === undefined) return null;
  return n.toFixed(2).replace(".", ",") + "\u20ac";
}


// ── Budget helpers ─────────────────────────────────────────

function weeklyEstimate(planner, recipes, catalogue, weekDates) {
  var total = 0;
  weekDates.forEach(function(date) {
    var dk = date.getFullYear()+"-"+(date.getMonth()<9?"0":"")+(date.getMonth()+1)+"-"+(date.getDate()<10?"0":"")+date.getDate();
    var daySlots = planner[dk] || {};
    Object.keys(daySlots).forEach(function(meal) {
      var rid = daySlots[meal];
      var r = recipes.find(function(x){ return x.id===rid; });
      if (r) {
        var cost = estimateCost(r, catalogue);
        if (cost) total += cost.total;
      }
    });
  });
  return Math.round(total * 100) / 100;
}

function monthlyExpenses(expenses, ym) {
  return expenses.filter(function(e){ return e.date && e.date.slice(0,7)===ym; });
}

function monthTotal(expenses, ym) {
  var list = monthlyExpenses(expenses, ym);
  var sum = list.reduce(function(s,e){ return s+(e.amount||0); }, 0);
  return Math.round(sum * 100) / 100;
}

function alertLevel(spent, budget) {
  if (!budget || budget <= 0) return "ok";
  var pct = spent / budget;
  if (pct >= 1) return "danger";
  if (pct >= 0.8) return "warning";
  return "ok";
}

function alertColor(level, t) {
  if (level === "danger") return "#e53935";
  if (level === "warning") return "#f57c00";
  return t.acc;
}

function getWeekKey(date) {
  var d = new Date(date);
  var jan1 = new Date(d.getFullYear(), 0, 1);
  var weekNum = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return d.getFullYear() + "-W" + (weekNum < 10 ? "0" : "") + weekNum;
}
function getBudgetForPeriod(schedule, type, dateKey, defaultVal) {
  if (!schedule || !schedule.length) return defaultVal;
  var found = schedule.filter(function(s){ return s.type===type && s.dateKey===dateKey; });
  if (found.length === 0) return defaultVal;
  return found[found.length-1].amount;
}
function fmtYM(ym) {
  var months = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  var parts = ym.split("-");
  return months[parseInt(parts[1],10)-1] + " " + parts[0];
}

function prevYM(ym) {
  var parts = ym.split("-");
  var y = parseInt(parts[0],10);
  var m = parseInt(parts[1],10) - 1;
  if (m < 1) { m = 12; y -= 1; }
  return y + "-" + (m<10?"0":"") + m;
}

function nextYM(ym) {
  var parts = ym.split("-");
  var y = parseInt(parts[0],10);
  var m = parseInt(parts[1],10) + 1;
  if (m > 12) { m = 1; y += 1; }
  return y + "-" + (m<10?"0":"") + m;
}

function currentYM() {
  var n = new Date();
  return n.getFullYear()+"-"+(n.getMonth()<9?"0":"")+(n.getMonth()+1);
}

            <div style={{display:"inline-flex",alignItems:"center",gap:8,background:t.bg,borderRadius:13,padding:"5px 13px 5px 10px",boxShadow:"3px 3px 8px "+t.s1+", -2px -2px 6px "+t.s2}}>
              <span style={{fontSize:20}}>{"🍽"}</span>
              <div>
                <div style={{fontFamily:"Georgia,serif",fontSize:17,fontWeight:700,fontStyle:"italic",color:t.text,letterSpacing:".8px",lineHeight:1.1,textShadow:"-1px -1px 1px "+t.s2+", 1px 1px 2px "+t.s1}}>Ma Table</div>

      {/* ══ PLANNING ══ */}
      {tab==="planner" && (
        <div>
          <ST theme={t} tx={TX}>📅 Planning</ST>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,background:t.bg,borderRadius:16,padding:"10px 14px",boxShadow:neu(t)}}>
            <button onClick={function(){setCalOffset(function(o){return o-1;});}} style={{background:t.bg,border:"none",borderRadius:10,width:36,height:36,cursor:"pointer",boxShadow:nSm(t),fontWeight:900,color:t.text2,fontSize:20}}>&#x2039;</button>
            <div style={{textAlign:"center"}}>
              <div style={{fontFamily:"Georgia,serif",fontWeight:700,fontSize:14,color:t.text}}>{fmtDate(weekDates[0])} – {fmtDate(weekDates[6])}</div>
              {calOffset===0 && <div style={{fontSize:10,color:t.acc,fontWeight:800,marginTop:2}}>CETTE SEMAINE</div>}
              {calOffset!==0 && <button onClick={function(){setCalOffset(0);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:t.text3,fontWeight:700}}>Retour aujourd'hui</button>}
            </div>
            <button onClick={function(){setCalOffset(function(o){return o+1;});}} style={{background:t.bg,border:"none",borderRadius:10,width:36,height:36,cursor:"pointer",boxShadow:nSm(t),fontWeight:900,color:t.text2,fontSize:20}}>&#x203a;</button>
          </div>
          <div style={{marginBottom:14}}>
            <Btn theme={t} accent onClick={genFromPlanner}>{genBtnLabel}</Btn>
          </div>
          <div style={{background:t.bg,borderRadius:20,padding:"14px 10px",boxShadow:neu(t)}}>
            <div style={{display:"grid",gridTemplateColumns:"52px 1fr 1fr 1fr",gap:7,marginBottom:10}}>
              <div/>
              {MEALS.map(function(m){ return <div key={m} style={{textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><div style={{width:8,height:8,borderRadius:"50%",background:MEAL_COLORS[m]||t.acc}}/><span style={{fontSize:10,fontWeight:800,letterSpacing:1,textTransform:"uppercase",color:t.text2}}>{m}</span></div>; })}
            </div>
            {weekDates.map(function(date,di){
              var dk = dayKey(date);
              var isToday = dk===todayKey;
              var isPast = date < new Date() && !isToday;
              return (
                <div key={dk} style={{display:"grid",gridTemplateColumns:"52px 1fr 1fr 1fr",gap:7,paddingBottom:di<6?10:0,marginBottom:di<6?10:0,borderBottom:di<6?"2px dashed "+t.s1:"none",background:isToday?t.acc+"08":"transparent",borderRadius:isToday?12:0,padding:isToday?"4px 6px":"0 0",opacity:isPast?0.5:1}}>

/* ─── RECETTE DETAIL (sous-composant) ────────────────────────── */
function RecDetail(props) {
  var t = props.theme;
  var rec = props.rec;
  var n = props.recServings && props.recServings.recId===rec.id ? props.recServings.n : rec.servings;
  var scaled = props.scaledIngredients(rec, n);
  var media = (props.recipeMedia && props.recipeMedia[rec.id]) || {};

  function readFile(file, onDone) {
    var reader = new FileReader();
    reader.onload = function(e) { onDone(e.target.result); };
    reader.readAsDataURL(file);
  }

  function setMedia(updater) {
    props.setRecipeMedia(function(prev) {
      var current = prev[rec.id] || {};
      var updated = updater(current);
      var next = Object.assign({}, prev);
      next[rec.id] = updated;
      return next;
    });
  }

  function handleMainPhoto(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    readFile(file, function(data) {
      setMedia(function(m) { return Object.assign({}, m, {photo: data}); });
    });
  }

  function handleStepPhoto(stepIdx, e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    readFile(file, function(data) {
      setMedia(function(m) {
        var sp = Object.assign({}, m.stepPhotos || {});
        sp[stepIdx] = data;
        return Object.assign({}, m, {stepPhotos: sp});
      });
    });
  }

  function handleFile(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    readFile(file, function(data) {
      setMedia(function(m) {
        var files = (m.files || []).concat([{name: file.name, type: file.type, data: data}]);
        return Object.assign({}, m, {files: files});
      });
    });
  }

  function removeFile(idx) {
    setMedia(function(m) {
      var files = (m.files || []).filter(function(_, i) { return i !== idx; });
      return Object.assign({}, m, {files: files});
    });
  }

  var inputStyle = {display:"none"};
  var photoBtn = {background:t.bg,border:"2px dashed "+t.s1,borderRadius:12,padding:"8px 14px",cursor:"pointer",fontFamily:"Nunito,sans-serif",fontWeight:700,fontSize:12,color:t.text3,display:"flex",alignItems:"center",gap:6};

  return (
    <div>
      {/* ── Photo principale ── */}
      {media.photo
        ? <div style={{position:"relative",marginBottom:14,borderRadius:16,overflow:"hidden"}}>
            <img src={media.photo} alt={rec.name} style={{width:"100%",maxHeight:220,objectFit:"cover",display:"block"}} />
            <button onClick={function(){setMedia(function(m){var x=Object.assign({},m); delete x.photo; return x;});}}
              style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,.5)",color:"#fff",border:"none",borderRadius:20,width:28,height:28,cursor:"pointer",fontSize:14,fontWeight:900}}>✕</button>
          </div>
        : <label style={Object.assign({},photoBtn,{marginBottom:14,justifyContent:"center",padding:"14px"})}>
            <input type="file" accept="image/*" style={inputStyle} onChange={handleMainPhoto} />
            📷 Ajouter une photo du plat
          </label>
      }

      {/* ── Emoji + chips ── */}
      {!media.photo && <div style={{fontSize:42,textAlign:"center",marginBottom:12}}>{rec.emoji}</div>}
      <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:10,justifyContent:"center"}}>
        <Chip theme={t}>⏱ {rec.time}min</Chip>
        <Chip theme={t} accent>{rec.category}</Chip>
        {rec.allergens && rec.allergens.map(function(a){ return <Chip key={a} theme={t}><span style={{color:WARN}}>⚠</span> {a}</Chip>; })}
      </div>

      {/* ── Portions ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:14,background:t.bg,borderRadius:13,padding:"10px 16px",boxShadow:neu(t)}}>
        <button onClick={function(){if(n>1) props.setRecServings({recId:rec.id,n:n-1});}} style={{background:t.bg,border:"none",borderRadius:9,width:32,height:32,cursor:"pointer",boxShadow:nSm(t),fontWeight:900,color:t.text2,fontSize:20}}>-</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontWeight:900,fontSize:22,color:t.acc}}>{n}</div>
          <div style={{fontSize:10,color:t.text3,fontWeight:700}}>PERSONNES</div>
        </div>
        <button onClick={function(){props.setRecServings({recId:rec.id,n:n+1});}} style={{background:t.bg,border:"none",borderRadius:9,width:32,height:32,cursor:"pointer",boxShadow:nSm(t),fontWeight:900,color:t.text2,fontSize:20}}>+</button>
      </div>

      {/* ── Ingrédients ── */}
      <div style={{fontWeight:800,fontSize:12,marginBottom:8,color:t.text2,letterSpacing:1.5}}>INGRÉDIENTS</div>
      {scaled.map(function(ing,i){
        return (
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",background:t.bg,borderRadius:10,marginBottom:5,boxShadow:nSm(t)}}>
            <span style={{fontWeight:600}}>{ing.name}</span>
            <span style={{color:t.acc,fontWeight:700}}>{ing.qty} {ing.unit}</span>
          </div>
        );
      })}

      {/* ── Étapes ── */}
      <div style={{fontWeight:800,fontSize:12,marginBottom:8,marginTop:14,color:t.text2,letterSpacing:1.5}}>PRÉPARATION</div>
      {rec.steps.map(function(s,i){
        var stepPhoto = media.stepPhotos && media.stepPhotos[i];
        return (
          <div key={i} style={{marginBottom:10,background:t.bg,borderRadius:12,padding:"10px 12px",boxShadow:nSm(t)}}>
            <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
              <span style={{fontWeight:900,color:t.acc,flexShrink:0,marginTop:2}}>{i+1}</span>
              <span style={{fontSize:13,lineHeight:1.6,flex:1}}>{s}</span>
              {!stepPhoto &&
                <label style={{flexShrink:0,cursor:"pointer",fontSize:18,opacity:.5}}>
                  <input type="file" accept="image/*" style={inputStyle} onChange={function(e){handleStepPhoto(i,e);}} />
                  📷
                </label>
              }
            </div>
            {stepPhoto &&
              <div style={{position:"relative",marginTop:8,borderRadius:10,overflow:"hidden"}}>
                <img src={stepPhoto} alt={"Étape "+(i+1)} style={{width:"100%",maxHeight:160,objectFit:"cover",display:"block"}} />
                <button onClick={function(){setMedia(function(m){ var sp=Object.assign({},m.stepPhotos||{}); delete sp[i]; return Object.assign({},m,{stepPhotos:sp}); });}}
                  style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,.5)",color:"#fff",border:"none",borderRadius:20,width:24,height:24,cursor:"pointer",fontSize:12,fontWeight:900}}>✕</button>
              </div>
            }
          </div>
        );
      })}

      {/* ── Fichiers joints ── */}
      <div style={{fontWeight:800,fontSize:12,marginBottom:8,marginTop:16,color:t.text2,letterSpacing:1.5}}>FICHIERS JOINTS</div>
      {(media.files||[]).map(function(f,i){
        var isPdf = f.type === "application/pdf";
        var isImg = f.type.indexOf("image") === 0;
        return (

function encodeShare(obj) {
  try {
    var json = JSON.stringify(obj);
    return btoa(unescape(encodeURIComponent(json)));
  } catch(e) { return null; }
}
function decodeShare(str) {
  try {
    var json = decodeURIComponent(escape(atob(str.trim())));
    return JSON.parse(json);
  } catch(e) { return null; }
}

/* ─── IMPORT MODAL ────────────────────────────────────────────── */
function ImportModal(props) {
  var t = props.theme;

  var _preview = useState(null); var preview = _preview[0]; var setPreview = _preview[1];
  var _err = useState(""); var err = _err[0]; var setErr = _err[1];

  function parseCode() {
    setErr("");
    setPreview(null);
    var data = decodeShare(props.importCode);
    if (!data) { setErr("Code invalide ou corrompu. Vérifiez et réessayez."); return; }
    setPreview(data);
  }



  function describePreview(data) {
    var parts = [];
    if (data.recipes && data.recipes.length) parts.push(data.recipes.length + " recette" + (data.recipes.length>1?"s":""));
    if (data.list) parts.push("liste \"" + data.list.name + "\" (" + (data.list.items||[]).length + " articles)");
    if (data.planner) parts.push("planning de la semaine");
    return parts.join(", ");

  var overlay = {position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:250,display:"flex",alignItems:"flex-end",justifyContent:"center"};
  var sheet = {background:t.bg,borderRadius:"22px 22px 0 0",padding:"22px 18px 44px",width:"100%",maxWidth:560,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 -8px 30px "+t.s1};

  return React.createElement("div", {onClick:props.onClose, style:overlay},
    React.createElement("div", {onClick:function(e){e.stopPropagation();}, style:sheet},

      React.createElement("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}},
        React.createElement("div", {style:{fontFamily:"Georgia,serif",fontWeight:700,fontSize:17,color:t.text}}, "📥 Importer"),
        React.createElement("button", {onClick:props.onClose, style:{background:t.bg,border:"none",borderRadius:10,width:32,height:32,cursor:"pointer",boxShadow:nSm(t),fontWeight:900,color:t.text3,fontSize:18}}, "×")
      ),



      /* Code input */
      React.createElement("div", null,
        React.createElement("div", {style:{fontSize:13,color:t.text2,marginBottom:8}}, "Collez le code reçu :"),
        React.createElement("textarea", {
          style:Object.assign({}, inpStyle(t), {minHeight:80,resize:"vertical",marginBottom:10,lineHeight:1.4,fontFamily:"monospace",fontSize:12}),
          placeholder:"Collez ici le code de partage...",
          value: props.importCode,
          onChange: function(e){ props.setImportCode(e.target.value); setPreview(null); setErr(""); }
        }),
        React.createElement("button", {
          onClick:parseCode,
          disabled:!props.importCode.trim(),
          style:{width:"100%",padding:"12px",borderRadius:13,border:"none",cursor:props.importCode.trim()?"pointer":"not-allowed",
            background:props.importCode.trim()?t.acc:t.s1,color:props.importCode.trim()?"#fff":t.text3,
            fontFamily:"Nunito,sans-serif",fontWeight:800,fontSize:14}
        }, "🔍 Analyser le code")
      ),



      /* Error */
      err && React.createElement("div", {style:{color:WARN,fontSize:13,fontWeight:700,padding:"10px 12px",background:"rgba(192,57,43,.1)",borderRadius:10,marginTop:10}}, err),

      /* Preview */
      preview && React.createElement("div", {style:{marginTop:14}},
        React.createElement("div", {style:{background:t.acc+"18",borderRadius:14,padding:"14px 16px",border:"2px solid "+t.acc+"44",marginBottom:14}},
          React.createElement("div", {style:{fontWeight:800,fontSize:14,color:t.text,marginBottom:4}}, "Contenu détecté :"),
          React.createElement("div", {style:{fontSize:13,color:t.text2}}, describePreview(preview)),
          preview.exported && React.createElement("div", {style:{fontSize:11,color:t.text3,marginTop:4}}, "Exporté le : " + preview.exported)
        ),
        /* Recipe list preview */
        preview.recipes && preview.recipes.length > 0 && React.createElement("div", {style:{marginBottom:12}},
          preview.recipes.map(function(r,i) {
            return React.createElement("div", {key:i, style:{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:8,marginBottom:4,background:t.bg,boxShadow:nSm(t)}},
              React.createElement("span", null, r.emoji),
              React.createElement("span", {style:{fontSize:13,fontWeight:600,color:t.text}}, r.name),
              React.createElement("span", {style:{fontSize:11,color:t.text3,marginLeft:"auto"}}, r.time+"min")
            );
          })
        ),
        React.createElement("button", {
          onClick: function(){props.onImport(preview);},
          style:{width:"100%",padding:"13px",borderRadius:14,border:"none",cursor:"pointer",background:t.acc,color:"#fff",fontFamily:"Nunito,sans-serif",fontWeight:800,fontSize:15}
        }, "✅ Importer dans mon application")
      )
    )
  );
}
